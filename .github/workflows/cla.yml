name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Set permissions for the workflow
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: github.event_name == 'pull_request_target' || (github.event_name == 'issue_comment' && github.event.issue.pull_request && startsWith(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA'))
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-cla-document: 'https://github.com/monokeros/monokeros/blob/main/docs/CLA.md'
          branch: 'main'
          allowlist: dependabot,renovate,github-actions[bot]

          # PR comment settings
          create-file-commit-message: 'docs: create CLA signature file'
          signed-commit-message: 'docs: sign CLA for #$pullRequestNo'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: '**CLA Assistant Bot** All contributors have signed the CLA. You can now merge this pull request.'
